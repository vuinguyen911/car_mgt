version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-car_admin}
      POSTGRES_USER:     ${POSTGRES_USER:-caradmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-caradmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]

  # ── Backend ────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/car-admin-backend:latest
    restart: unless-stopped
    environment:
      NODE_ENV:         production
      PORT:             3001
      DATABASE_URL:     postgresql://${POSTGRES_USER:-caradmin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-car_admin}
      REDIS_HOST:       redis
      REDIS_PORT:       6379
      JWT_SECRET:       ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?required}
      JWT_EXPIRES_IN:   15m
      JWT_REFRESH_EXPIRES_IN: 7d
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks: [internal, public]
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Frontend ───────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/car-admin-frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   ${API_URL:-http://backend:3001/api/v1}
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [internal, public]
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on: [frontend, backend]
    networks: [public]

volumes:
  postgres_data:
  redis_data:
  nginx_cache:

networks:
  internal: { driver: bridge }
  public:   { driver: bridge }
